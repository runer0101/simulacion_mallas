name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src/config.py src/validators src/routes/api.py src/routes/web.py src/services/mesh_analyzer.py tests

      - name: Format check (black)
        run: black --check src/config.py src/validators src/routes/api.py src/routes/web.py src/services/mesh_analyzer.py tests

      - name: Test (pytest)
        run: pytest